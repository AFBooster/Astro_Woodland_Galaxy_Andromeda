<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Constellation Quiz — Woodlands Galaxy</title>
<meta name="description" content="A quick constellation-guessing game for the Andromeda Observatory: name the star pattern from its shape.">
<style>
:root{color-scheme:dark;--navy:#0b1733;--navy2:#13224a;--navy3:#1a2b56;--gold:#f5c542;--cyan:#5bd6e0;--white:#f4f6fb;--mute:#9fb0d6;--line:#33406b;--green:#5fd38a;--red:#ff6b6b;}
*{box-sizing:border-box;margin:0;}
body{background:var(--navy);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.55;}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 42px;}
header{padding:18px 0 6px;}
h1{font-size:22px;margin:0;color:var(--gold);}
.loc{font-size:12.5px;color:var(--mute);margin-top:3px;}
.bar{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bar a{color:var(--cyan);font-weight:700;font-size:12.5px;border:1px solid var(--cyan);border-radius:9px;padding:7px 12px;text-decoration:none;}
.score{margin-left:auto;font-weight:800;color:var(--gold);}
.chart{background:radial-gradient(circle at 50% 42%,#0e1c3e,#070d1e);border:1px solid var(--line);border-radius:14px;margin:14px auto;max-width:360px;}
.chart svg{width:100%;height:auto;display:block;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.opts button{background:var(--navy3);border:1px solid var(--line);color:var(--white);border-radius:11px;padding:14px 10px;font-size:15px;font-weight:700;cursor:pointer;}
.opts button.right{background:rgba(95,211,138,.2);border-color:var(--green);color:#c9f7db;}
.opts button.wrong{background:rgba(255,107,107,.2);border-color:var(--red);color:#ffd0d0;}
.opts button:disabled{cursor:default;opacity:.9;}
.fb{text-align:center;font-weight:700;margin:12px 0 4px;min-height:22px;}
.next{display:block;margin:8px auto 0;background:var(--gold);color:#0b1733;border:none;border-radius:10px;padding:11px 22px;font-size:15px;font-weight:800;cursor:pointer;}
.foot{margin-top:24px;font-size:11.5px;color:var(--mute);border-top:1px solid var(--line);padding-top:14px;}
.foot a{color:var(--cyan);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>❓ Constellation Quiz</h1>
    <div class="loc">Name the star pattern from its shape. Andromeda Observatory, Woodlands Galaxy CC.</div>
    <div class="bar"><a href="Woodland_Galaxy.html">← Dashboard</a><a href="constellation-story.html">✨ Learn the stories</a><span class="score" id="score">0 / 0</span></div>
  </header>
  <div class="chart" id="chart"></div>
  <div class="opts" id="opts"></div>
  <div class="fb" id="fb"></div>
  <button class="next" id="next" style="display:none">Next ▶</button>
  <div class="foot">Star patterns use real bright-star coordinates. A fun way to learn the sky before you look up. · <span class="scob-version" style="opacity:.75"></span></div>
</div>
<script>
"use strict";
var CONST=[
['Orion',[[88.79,7.41],[81.28,6.35],[85.19,-1.94],[84.05,-1.20],[83.00,-0.30],[86.94,-9.67],[78.63,-8.20],[83.78,9.93]],[[0,1],[1,4],[4,3],[3,2],[2,5],[5,6],[6,4],[0,2],[0,7],[1,7]]],
['Canis Major',[[101.29,-16.72],[95.67,-17.96],[105.94,-15.63],[107.10,-26.39],[104.66,-28.97],[111.02,-29.30]],[[0,1],[0,2],[0,3],[3,4],[4,5],[3,1]]],
['Taurus',[[68.98,16.51],[81.57,28.61],[84.41,21.14],[60.17,12.49],[67.17,15.87],[56.87,24.11]],[[0,1],[0,2],[0,4],[4,3],[3,5]]],
['Gemini',[[113.65,31.89],[116.33,28.03],[99.43,16.40],[95.74,22.51],[100.98,25.13],[110.03,21.98],[101.32,12.90]],[[0,1],[0,4],[4,3],[1,5],[5,6],[5,2]]],
['Leo',[[152.09,11.97],[151.83,16.76],[154.99,19.84],[154.17,23.42],[148.19,26.01],[146.46,23.77],[177.26,14.57],[168.53,20.52],[168.56,15.43]],[[5,4],[4,3],[3,2],[2,1],[1,0],[0,8],[8,6],[6,7],[7,2]]],
['Bootes',[[213.92,19.18],[221.25,27.07],[222.20,33.31],[225.49,40.39],[218.02,38.31]],[[0,1],[1,2],[2,3],[3,4],[4,1]]],
['Scorpius',[[247.35,-26.43],[241.36,-19.81],[240.08,-22.62],[239.71,-26.11],[248.97,-28.22],[252.97,-34.29],[253.84,-38.05],[253.50,-42.36],[258.04,-43.24],[264.33,-42.99],[266.90,-40.13],[265.62,-39.03],[263.40,-37.10]],[[1,2],[2,3],[2,0],[0,4],[4,5],[5,6],[6,7],[7,8],[8,9],[9,10],[10,11],[11,12]]],
['Sagittarius',[[276.04,-34.38],[275.25,-29.83],[276.99,-25.42],[283.82,-26.30],[285.65,-26.99],[285.65,-29.88],[286.74,-27.67]],[[2,1],[1,0],[0,5],[5,4],[4,3],[3,2],[4,6]]],
['Crux',[[186.65,-63.10],[187.79,-57.11],[191.93,-59.69],[183.79,-58.75]],[[0,1],[2,3]]],
['Lyra',[[279.23,38.78],[282.52,33.36],[284.74,32.69],[283.63,36.90],[281.19,37.61]],[[0,4],[4,3],[3,2],[2,1],[1,4]]],
['Cygnus',[[310.36,45.28],[305.56,40.26],[311.55,33.97],[296.24,45.13],[292.68,27.96]],[[0,1],[1,2],[1,3],[1,4]]],
['Aquila',[[297.70,8.87],[296.56,10.61],[298.83,6.41],[291.37,3.11],[286.35,13.86]],[[1,0],[0,2],[0,3],[3,4]]],
['Cassiopeia',[[10.13,56.54],[2.29,59.15],[14.18,60.72],[21.45,60.24],[28.60,63.67]],[[1,0],[0,2],[2,3],[3,4]]],
['Ursa Major',[[165.93,61.75],[165.46,56.38],[178.46,53.69],[183.86,57.03],[193.51,55.96],[200.98,54.93],[206.89,49.31]],[[0,1],[1,2],[2,3],[3,0],[3,4],[4,5],[5,6]]]
];
function draw(c){
  var stars=c[1],lines=c[2];
  var mR=stars.reduce(function(a,s){return a+s[0];},0)/stars.length,mD=stars.reduce(function(a,s){return a+s[1];},0)/stars.length,cd=Math.cos(mD*Math.PI/180);
  var pts=stars.map(function(s){var dra=s[0]-mR;if(dra>180)dra-=360;if(dra<-180)dra+=360;return[-dra*cd,-(s[1]-mD)];});
  var xs=pts.map(function(p){return p[0];}),ys=pts.map(function(p){return p[1];});
  var minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs),minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
  var W=320,H=250,pad=40,sc=Math.min((W-2*pad)/((maxX-minX)||1),(H-2*pad)/((maxY-minY)||1));
  var ox=(W-(minX+maxX)*sc)/2,oy=(H-(minY+maxY)*sc)/2,P=function(p){return[p[0]*sc+ox,p[1]*sc+oy];};
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  lines.forEach(function(g){var a=P(pts[g[0]]),b=P(pts[g[1]]);svg+='<line x1="'+a[0].toFixed(1)+'" y1="'+a[1].toFixed(1)+'" x2="'+b[0].toFixed(1)+'" y2="'+b[1].toFixed(1)+'" stroke="#8ea3d8" stroke-width="1.4" opacity="0.8"/>';});
  pts.forEach(function(p){var q=P(p);svg+='<circle cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" r="2.8" fill="#fff"/>';});
  return svg+'</svg>';
}
var score=0,asked=0,answered=false;
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function nextQ(){
  answered=false;document.getElementById('fb').textContent='';document.getElementById('next').style.display='none';
  var ci=Math.floor(Math.random()*CONST.length),correct=CONST[ci][0];
  document.getElementById('chart').innerHTML=draw(CONST[ci]);
  var opts=[correct];while(opts.length<4){var r=CONST[Math.floor(Math.random()*CONST.length)][0];if(opts.indexOf(r)<0)opts.push(r);}
  shuffle(opts);
  document.getElementById('opts').innerHTML=opts.map(function(o){return '<button data-o="'+o+'">'+o+'</button>';}).join('');
  Array.prototype.forEach.call(document.querySelectorAll('#opts button'),function(b){b.onclick=function(){answer(b,correct);};});
}
function answer(btn,correct){
  if(answered)return;answered=true;asked++;
  var chosen=btn.getAttribute('data-o'),ok=chosen===correct;
  if(ok)score++;
  Array.prototype.forEach.call(document.querySelectorAll('#opts button'),function(b){b.disabled=true;var o=b.getAttribute('data-o');if(o===correct)b.className='right';else if(o===chosen)b.className='wrong';});
  document.getElementById('fb').innerHTML=ok?'<span style="color:var(--green)">✔ Correct — it’s '+correct+'!</span>':'<span style="color:var(--red)">✘ That was '+chosen+' — it’s '+correct+'.</span>';
  document.getElementById('score').textContent=score+' / '+asked;
  document.getElementById('next').style.display='block';
}
document.getElementById('next').onclick=nextQ;
nextQ();
</script>
<script src="version.js"></script>
</body>
</html>
